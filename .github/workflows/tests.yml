name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  godot-tests:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.6-stable"
    steps:
      - uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${GODOT_VERSION}_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --headless --version

      - name: Import project
        run: godot --headless --path . --import || true

      - name: Run headless tests
        run: |
          set -euo pipefail
          status=0
          for t in test_flooding test_inventory test_ui_visibility; do
            echo "::group::$t"
            if ! godot --headless --path . --script "tests/$t.gd"; then
              echo "::error::$t failed"
              status=1
            fi
            echo "::endgroup::"
          done
          exit $status
